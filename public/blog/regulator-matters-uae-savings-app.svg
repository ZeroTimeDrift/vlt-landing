<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.6" fill="rgba(255,255,255,0.04)"/>
    </pattern>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#00A3FF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="420" fill="#020810"/>
  <rect width="1200" height="420" fill="url(#dots)"/>

  <!-- Title label -->
  <text x="600" y="50" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="0.12em" fill="rgba(255,255,255,0.2)">UAE SAVINGS APP — REGULATORY CHECKLIST</text>

  <!-- Three question cards -->

  <!-- Card 1 -->
  <rect x="80" y="72" width="310" height="120" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="104" y="102" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="rgba(0,102,255,0.6)">01</text>
  <text x="104" y="126" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.6)">Is this firm licensed?</text>
  <text x="104" y="148" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.3)">Check ADGM or DFSA public register.</text>
  <text x="104" y="164" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.3)">Registered ≠ Licensed.</text>

  <!-- Card 2 -->
  <rect x="445" y="72" width="310" height="120" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="469" y="102" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="rgba(0,102,255,0.6)">02</text>
  <text x="469" y="126" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.6)">Are funds segregated?</text>
  <text x="469" y="148" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.3)">Client assets must be separate from</text>
  <text x="469" y="164" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.3)">the firm's own capital.</text>

  <!-- Card 3 -->
  <rect x="810" y="72" width="310" height="120" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="834" y="102" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="rgba(0,102,255,0.6)">03</text>
  <text x="834" y="126" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.6)">Who is accountable?</text>
  <text x="834" y="148" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.3)">Named compliance officer,</text>
  <text x="834" y="164" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.3)">audited accounts, complaint path.</text>

  <!-- Divider -->
  <line x1="80" y1="222" x2="1120" y2="222" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Status table -->
  <text x="80" y="254" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="0.08em" fill="rgba(255,255,255,0.2)">UAE SAVINGS APP STATUS</text>

  <!-- Sarwa row -->
  <text x="80" y="284" font-family="Inter, system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.5)">Sarwa Save+</text>
  <rect x="260" y="270" width="110" height="22" rx="11" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.25)" stroke-width="1"/>
  <text x="315" y="285" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#10B981">ADGM + DFSA</text>
  <text x="400" y="284" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.25)">~3.2% net after 0.5% fee</text>

  <!-- Vault row -->
  <text x="80" y="322" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.75)">Vault</text>
  <rect x="260" y="308" width="138" height="22" rx="11" fill="rgba(255,193,7,0.08)" stroke="rgba(255,193,7,0.2)" stroke-width="1"/>
  <text x="329" y="323" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="rgba(255,193,7,0.7)">PURSUING ADGM</text>
  <text x="430" y="322" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#0066FF">~5.4% variable, no fee</text>

  <!-- Footer -->
  <text x="600" y="385" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.15)">Rate is variable, not guaranteed. Vault is pursuing ADGM regulatory approval. vlt.money</text>
</svg>
