<svg width="1200" height="420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.6" fill="rgba(255,255,255,0.04)"/>
    </pattern>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#00A3FF"/>
    </linearGradient>
    <linearGradient id="barBlue" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="rgba(0,102,255,0.4)"/>
      <stop offset="100%" stop-color="#0066FF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="420" fill="#020810"/>
  <rect width="1200" height="420" fill="url(#dots)"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="0.12em" fill="rgba(255,255,255,0.3)">THE YIELD GAP IN UAE FINTECH</text>

  <!-- Chart baseline -->
  <line x1="150" y1="310" x2="1050" y2="310" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Bar 1: Typical fintech wallets -->
  <rect x="180" y="262" width="100" height="48" rx="4" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="230" y="248" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">0%</text>
  <text x="230" y="332" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.25)">Fintech</text>
  <text x="230" y="346" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.25)">wallets</text>

  <!-- Bar 2: UAE banks standard -->
  <rect x="330" y="222" width="100" height="88" rx="4" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>
  <text x="380" y="208" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">1.5%</text>
  <text x="380" y="332" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.25)">Standard</text>
  <text x="380" y="346" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.25)">banks</text>

  <!-- Bar 3: Wio conditional -->
  <rect x="480" y="172" width="100" height="138" rx="4" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>
  <text x="530" y="158" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">3.25%</text>
  <text x="530" y="332" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.25)">Wio</text>
  <text x="530" y="346" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.25)">(flexible)</text>

  <!-- Bar 4: Sarwa -->
  <rect x="630" y="138" width="100" height="172" rx="4" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
  <text x="680" y="124" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.45)">4.1%</text>
  <text x="680" y="332" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.3)">Sarwa</text>
  <text x="680" y="346" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.3)">Save</text>

  <!-- Bar 5: Vault (highlighted) -->
  <rect x="820" y="95" width="130" height="215" rx="6" fill="rgba(0,102,255,0.15)" stroke="#0066FF" stroke-width="1.5"/>
  <rect x="820" y="95" width="130" height="4" rx="6" fill="url(#blueGrad)"/>
  <text x="885" y="80" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#0066FF">~5.4%</text>
  <text x="885" y="332" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="rgba(255,255,255,0.7)">Vault</text>
  <text x="885" y="348" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(0,153,255,0.6)">no lock-in</text>

  <!-- Gap annotation -->
  <line x1="730" y1="138" x2="820" y2="95" stroke="rgba(0,102,255,0.2)" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="778" y="108" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(0,102,255,0.5)">gap</text>

  <!-- Footer -->
  <text x="600" y="388" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.2)">UAE fintechs sit on billions in idle user balances. Most pay nothing on them.</text>
</svg>
