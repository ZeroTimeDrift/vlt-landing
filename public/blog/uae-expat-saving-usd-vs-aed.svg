<svg width="1200" height="420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.6" fill="rgba(255,255,255,0.04)"/>
    </pattern>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#00A3FF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="420" fill="#020810"/>
  <rect width="1200" height="420" fill="url(#dots)"/>
  <ellipse cx="600" cy="210" rx="500" ry="160" fill="rgba(0,102,255,0.03)"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="0.12em" fill="rgba(255,255,255,0.3)">USD VS AED — WHERE TO SAVE</text>

  <!-- USD card -->
  <rect x="80" y="90" width="460" height="260" rx="14" fill="rgba(0,102,255,0.07)" stroke="#0066FF" stroke-width="1.5"/>
  <rect x="80" y="90" width="460" height="3" rx="14" fill="url(#blueGrad)"/>

  <text x="310" y="128" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="white">USD</text>
  <text x="310" y="150" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.3)">US Dollar</text>

  <text x="310" y="192" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(16,185,129,0.7)">✓  Pegged to AED (3.673 fixed)</text>
  <text x="310" y="214" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(16,185,129,0.6)">✓  No FX risk for UAE savings</text>
  <text x="310" y="236" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(16,185,129,0.6)">✓  Global spending currency</text>
  <text x="310" y="258" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(16,185,129,0.6)">✓  Remittance-ready</text>

  <line x1="130" y1="278" x2="490" y2="278" stroke="rgba(0,102,255,0.1)" stroke-width="1"/>
  <text x="310" y="300" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#0066FF">~5.4% with Vault</text>
  <text x="310" y="322" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.25)">on USD savings</text>

  <!-- AED card -->
  <rect x="660" y="90" width="460" height="260" rx="14" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <text x="890" y="128" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="rgba(255,255,255,0.6)">AED</text>
  <text x="890" y="150" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.25)">UAE Dirham</text>

  <text x="890" y="192" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(16,185,129,0.5)">✓  Local bank accounts easy</text>
  <text x="890" y="214" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(16,185,129,0.5)">✓  Pegged to USD (same risk)</text>
  <text x="890" y="236" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(239,68,68,0.4)">✗  Lower savings rates available</text>
  <text x="890" y="258" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(239,68,68,0.4)">✗  1–3.25% typical, no lock-in</text>

  <line x1="710" y1="278" x2="1070" y2="278" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="890" y="300" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="rgba(255,255,255,0.35)">1–3.25%</text>
  <text x="890" y="322" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.2)">typical UAE bank</text>

  <!-- Footer -->
  <text x="600" y="388" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.2)">AED/USD peg means no FX risk. USD just earns more right now.</text>
</svg>
