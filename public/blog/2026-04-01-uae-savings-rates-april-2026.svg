<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.6" fill="rgba(255,255,255,0.04)"/>
    </pattern>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#00A3FF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="420" fill="#020810"/>
  <rect width="1200" height="420" fill="url(#dots)"/>

  <!-- Subtle glow behind Vault bar -->
  <ellipse cx="885" cy="200" rx="350" ry="180" fill="rgba(0,102,255,0.03)"/>

  <!-- Title -->
  <text x="600" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="0.12em" fill="rgba(255,255,255,0.3)">UAE SAVINGS RATES: APRIL 2026</text>

  <!-- Y-axis labels -->
  <text x="88" y="108" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.2)">6%</text>
  <text x="88" y="168" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.2)">4%</text>
  <text x="88" y="228" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.2)">2%</text>

  <!-- Horizontal grid lines -->
  <line x1="96" y1="104" x2="1100" y2="104" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="96" y1="164" x2="1100" y2="164" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="96" y1="224" x2="1100" y2="224" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="96" y1="284" x2="1100" y2="284" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Baseline -->
  <line x1="100" y1="316" x2="1100" y2="316" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Bar 1: FAB iSave 4% (new funds only — conditions apply) -->
  <rect x="130" y="176" width="100" height="140" rx="3" fill="rgba(255,170,0,0.07)" stroke="rgba(255,170,0,0.15)" stroke-width="1"/>
  <text x="180" y="163" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,170,0,0.6)">4%</text>
  <text x="180" y="336" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.2)">FAB</text>
  <text x="180" y="348" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="rgba(255,170,0,0.5)">new funds*</text>

  <!-- Bar 2: Sarwa ~3.2% net -->
  <rect x="330" y="203" width="100" height="113" rx="3" fill="rgba(255,255,255,0.08)"/>
  <text x="380" y="190" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.35)">3.2%</text>
  <text x="380" y="336" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.2)">Sarwa</text>
  <text x="380" y="348" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.2)">Save</text>

  <!-- Bar 3: StashAway 3.9% -->
  <rect x="530" y="178" width="100" height="138" rx="3" fill="rgba(255,255,255,0.09)"/>
  <text x="580" y="165" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">3.9%</text>
  <text x="580" y="336" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.2)">StashAway</text>
  <text x="580" y="348" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.2)">Simple</text>

  <!-- Bar 3b: Mashreq NEO PLUS 5% (conditional) -->
  <rect x="670" y="140" width="100" height="176" rx="3" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="720" y="128" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.3)">5%</text>
  <text x="720" y="336" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.2)">Mashreq</text>
  <text x="720" y="348" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.15)">NEO PLUS</text>
  <rect x="672" y="356" width="96" height="15" rx="7" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="720" y="367" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="rgba(255,255,255,0.18)">AED 50K+ · 2/mo</text>

  <!-- Bar 4: Vault ~5.4% (hero bar) -->
  <rect x="820" y="125" width="130" height="191" rx="4" fill="rgba(0,102,255,0.15)" stroke="#0066FF" stroke-width="1.5"/>
  <rect x="820" y="125" width="130" height="4" rx="4" fill="url(#blueGrad)"/>
  <text x="885" y="113" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800" fill="#0066FF">~5.4%</text>
  <text x="885" y="336" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="rgba(255,255,255,0.7)">Vault</text>
  <rect x="835" y="344" width="100" height="18" rx="9" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.25)" stroke-width="1"/>
  <text x="885" y="357" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#10B981">no conditions</text>

  <!-- Footer -->
  <text x="600" y="390" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.2)">*FAB iSave 4% applies to new funds only (above Apr 2023 balance), valid through June 30, 2026. Existing balance earns ~2.5%.</text>
  <text x="600" y="408" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.15)">Rates variable. Vault earns from institutional lending fees — not guaranteed. vlt.money</text>
</svg>
