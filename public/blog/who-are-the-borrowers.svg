<svg width="1200" height="420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.6" fill="rgba(255,255,255,0.04)"/>
    </pattern>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#00A3FF"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#0066FF"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="420" fill="#020810"/>
  <rect width="1200" height="420" fill="url(#dots)"/>
  <ellipse cx="600" cy="210" rx="500" ry="160" fill="rgba(0,102,255,0.03)"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="0.12em" fill="rgba(255,255,255,0.3)">WHO BORROWS — AND WHY</text>

  <!-- You (left) -->
  <rect x="60" y="140" width="160" height="120" rx="12" fill="rgba(0,102,255,0.08)" stroke="rgba(0,102,255,0.25)" stroke-width="1"/>
  <text x="140" y="186" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="28" fill="rgba(255,255,255,0.6)">👤</text>
  <text x="140" y="216" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.8)">You deposit</text>
  <text x="140" y="238" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.3)">via Vault</text>

  <!-- Arrow to Sentora -->
  <line x1="222" y1="200" x2="298" y2="200" stroke="rgba(0,102,255,0.4)" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Sentora vault (center left) -->
  <rect x="300" y="130" width="200" height="140" rx="12" fill="rgba(0,102,255,0.1)" stroke="#0066FF" stroke-width="1.5"/>
  <rect x="300" y="130" width="200" height="3" rx="12" fill="url(#blueGrad)"/>
  <text x="400" y="170" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="rgba(255,255,255,0.5)">Sentora</text>
  <text x="400" y="188" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.35)">PYUSD vault</text>
  <text x="400" y="216" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#0066FF">$3B+</text>
  <text x="400" y="240" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.3)">institutional lending</text>
  <text x="400" y="256" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.25)">market</text>

  <!-- Arrow to borrowers -->
  <line x1="502" y1="200" x2="578" y2="200" stroke="rgba(0,102,255,0.3)" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Borrowers section (right) -->
  <rect x="580" y="100" width="560" height="230" rx="12" fill="rgba(255,255,255,0.01)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="860" y="132" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="rgba(255,255,255,0.4)">Institutional borrowers</text>

  <!-- Borrower types -->
  <rect x="600" y="148" width="230" height="68" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="715" y="176" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.65)">Market Makers</text>
  <text x="715" y="198" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.3)">Trading firms, arbitrage desks</text>

  <rect x="840" y="148" width="280" height="68" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="980" y="176" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.65)">Institutional Traders</text>
  <text x="980" y="198" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.3)">Crypto-native hedge funds</text>

  <rect x="600" y="228" width="230" height="68" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="715" y="256" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.65)">Overcollateralised</text>
  <text x="715" y="278" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.3)">Assets posted as collateral</text>

  <rect x="840" y="228" width="280" height="68" rx="8" fill="rgba(0,102,255,0.05)" stroke="rgba(0,102,255,0.15)" stroke-width="1"/>
  <text x="980" y="256" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.65)">They pay fees</text>
  <text x="980" y="278" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(0,153,255,0.6)">→ which become your return</text>

  <!-- Footer -->
  <text x="600" y="388" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.2)">Not peer-to-peer. Not retail. Institutional borrowers with collateral.</text>
</svg>
