<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="0.5" fill="rgba(255,255,255,0.04)"/>
    </pattern>
    <linearGradient id="vaultBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#00A3FF"/>
    </linearGradient>
    <linearGradient id="dimBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="420" fill="#020810"/>
  <rect width="1200" height="420" fill="url(#grid)"/>

  <!-- Subtle ellipse glow -->
  <ellipse cx="900" cy="200" rx="400" ry="200" fill="rgba(0,102,255,0.03)"/>

  <!-- Left column header -->
  <text x="80" y="46" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="0.1em" fill="rgba(255,255,255,0.25)">EMIRATES ISLAMIC BANK — SAVINGS RATES VS ALTERNATIVES</text>
  <text x="80" y="82" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="700" fill="rgba(255,255,255,0.88)">Islamic savings in the UAE — what you actually earn in 2026.</text>

  <!-- Row 1: EIB savings account -->
  <text x="80" y="133" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.3)">EIB savings account</text>
  <rect x="300" y="120" width="14" height="18" rx="3" fill="url(#dimBar)"/>
  <text x="322" y="134" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="rgba(255,255,255,0.35)">0.5–1.5%</text>

  <!-- Row 2: EIB Smart Saver -->
  <text x="80" y="169" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.3)">EIB Smart Saver</text>
  <rect x="300" y="156" width="50" height="18" rx="3" fill="url(#dimBar)"/>
  <text x="358" y="170" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="rgba(255,255,255,0.35)">up to 3%</text>
  <rect x="430" y="160" width="78" height="14" rx="7" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="469" y="170" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="rgba(255,255,255,0.3)" text-anchor="middle">CONDITIONS</text>

  <!-- Row 3: Sarwa Save+ (Halal) -->
  <text x="80" y="205" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.3)">Sarwa Save+ (Halal)</text>
  <rect x="300" y="192" width="100" height="18" rx="3" fill="url(#dimBar)"/>
  <text x="408" y="206" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="rgba(255,255,255,0.35)">~3.5%</text>
  <rect x="450" y="196" width="82" height="14" rx="7" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.25)" stroke-width="1"/>
  <text x="491" y="206" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#10B981" text-anchor="middle">SHARIA-CERT</text>

  <!-- Row 4: StashAway Simple -->
  <text x="80" y="241" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.3)">StashAway Simple</text>
  <rect x="300" y="228" width="115" height="18" rx="3" fill="url(#dimBar)"/>
  <text x="423" y="242" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="rgba(255,255,255,0.35)">3.9%</text>

  <!-- Divider -->
  <line x1="60" y1="260" x2="660" y2="260" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Vault highlighted row -->
  <rect x="60" y="275" width="570" height="56" rx="10" fill="rgba(0,102,255,0.07)" stroke="rgba(0,102,255,0.25)" stroke-width="1.5"/>
  <text x="80" y="308" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="rgba(255,255,255,0.9)">Vault</text>
  <text x="80" y="322" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.3)">No conditions · No lock-in · USD · Not yet Islamic-certified</text>
  <rect x="300" y="292" width="240" height="22" rx="4" fill="url(#vaultBar)" opacity="0.9"/>
  <text x="548" y="307" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="800" fill="#0066FF">~5.4%</text>
  <!-- CURRENT pill -->
  <rect x="548" y="313" width="58" height="16" rx="8" fill="rgba(16,185,129,0.15)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <text x="577" y="324" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#10B981" text-anchor="middle">CURRENT</text>

  <!-- Right column callout card -->
  <rect x="720" y="95" width="420" height="265" rx="16" fill="rgba(0,102,255,0.05)" stroke="rgba(0,102,255,0.12)" stroke-width="1.5"/>
  <!-- Accent top bar -->
  <rect x="720" y="95" width="420" height="3" rx="2" fill="url(#vaultBar)"/>

  <text x="930" y="140" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="0.1em" fill="rgba(255,255,255,0.3)" text-anchor="middle">NO-CONDITION SAVINGS COMPARISON</text>

  <!-- Stacked rates -->
  <text x="930" y="165" font-family="Inter, system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.35)" text-anchor="middle">EIB flexible: 0.5–1.5%</text>
  <text x="930" y="198" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="rgba(255,255,255,0.6)" text-anchor="middle">Sarwa Halal: ~3.5%</text>
  <text x="930" y="242" font-family="Inter, system-ui, sans-serif" font-size="40" font-weight="800" fill="#FFFFFF" text-anchor="middle">Vault: ~5.4%</text>

  <!-- Divider line -->
  <line x1="800" y1="258" x2="1060" y2="258" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <text x="930" y="278" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.45)" text-anchor="middle">annual · variable · USD</text>
  <text x="930" y="298" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.25)" text-anchor="middle">Not yet Islamic-certified</text>

  <!-- WAITLIST OPEN pill -->
  <rect x="862" y="315" width="136" height="22" rx="11" fill="rgba(16,185,129,0.15)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <text x="930" y="329" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#10B981" text-anchor="middle">WAITLIST OPEN</text>

  <!-- Footer disclaimer -->
  <text x="80" y="400" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.18)">Rates variable. Vault (Prometheus Labs) pursuing ADGM authorisation, not yet licensed. Not Islamic-certified. vlt.money</text>
</svg>