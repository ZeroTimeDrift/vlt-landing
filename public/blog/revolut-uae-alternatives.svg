<svg width="1200" height="420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="0.5" fill="rgba(255,255,255,0.04)"/>
    </pattern>
    <linearGradient id="vaultBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#00A3FF"/>
    </linearGradient>
    <linearGradient id="dimBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="420" fill="#020810"/>
  <rect width="1200" height="420" fill="url(#grid)"/>
  <ellipse cx="900" cy="200" rx="400" ry="200" fill="rgba(0,102,255,0.03)"/>

  <!-- Header label -->
  <text x="100" y="52" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" letter-spacing="0.12em" fill="rgba(255,255,255,0.25)">REVOLUT UAE — NOT YET LIVE</text>

  <!-- Title -->
  <text x="100" y="92" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="700" fill="rgba(255,255,255,0.9)">Revolut UAE has no savings feature. What does?</text>

  <!-- Comparison rows -->
  <!-- Revolut UAE -->
  <text x="100" y="148" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.3)">Revolut UAE (at launch)</text>
  <rect x="280" y="134" width="5" height="18" rx="3" fill="url(#dimBar)" opacity="0.3"/>
  <text x="293" y="148" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="rgba(239,68,68,0.7)" dx="8">0% — SVF licence, no savings</text>
  <text x="100" y="163" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.2)">In-principle approval only. No launch date.</text>

  <!-- UAE bank savings -->
  <text x="100" y="197" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.3)">UAE bank savings</text>
  <rect x="280" y="183" width="25" height="18" rx="3" fill="url(#dimBar)"/>
  <text x="313" y="197" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="rgba(255,255,255,0.3)" dx="8">0.5–2.5%</text>

  <!-- StashAway -->
  <text x="100" y="234" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.3)">StashAway Simple</text>
  <rect x="280" y="220" width="137" height="18" rx="3" fill="url(#dimBar)"/>
  <text x="425" y="234" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="rgba(255,255,255,0.35)" dx="8">3.9%</text>

  <!-- Sarwa -->
  <text x="100" y="271" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.3)">Sarwa Save+ (net)</text>
  <rect x="280" y="257" width="113" height="18" rx="3" fill="url(#dimBar)"/>
  <text x="401" y="271" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="rgba(255,255,255,0.3)" dx="8">~3.2%</text>

  <!-- Vault — highlighted -->
  <rect x="80" y="296" width="570" height="58" rx="10" fill="rgba(0,102,255,0.07)" stroke="rgba(0,102,255,0.25)" stroke-width="1.5"/>
  <text x="100" y="332" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="rgba(255,255,255,0.9)">Vault</text>
  <text x="100" y="348" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.3)">No fee. No lock-in. UAE-based.</text>
  <rect x="280" y="314" width="243" height="22" rx="4" fill="url(#vaultBar)" opacity="0.9"/>
  <text x="531" y="330" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="800" fill="#0066FF" dx="8">~5.4%</text>
  <rect x="536" y="337" width="58" height="16" rx="8" fill="rgba(16,185,129,0.15)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <text x="565" y="348" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#10B981">CURRENT</text>

  <!-- Right side callout -->
  <rect x="740" y="110" width="360" height="240" rx="16" fill="rgba(0,102,255,0.05)" stroke="rgba(0,102,255,0.12)" stroke-width="1.5"/>
  <rect x="740" y="110" width="360" height="3" rx="2" fill="url(#vaultBar)"/>

  <text x="920" y="155" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" letter-spacing="0.1em" fill="rgba(255,255,255,0.3)">VS REVOLUT UK SAVINGS</text>

  <!-- Revolut UK row -->
  <text x="780" y="200" font-family="Inter, system-ui, sans-serif" font-size="14" fill="rgba(255,255,255,0.45)">Revolut UK</text>
  <text x="1060" y="200" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="14" fill="rgba(255,255,255,0.45)">~3.5–4.5%</text>

  <!-- Divider -->
  <line x1="780" y1="218" x2="1060" y2="218" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Vault row -->
  <text x="780" y="250" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="rgba(255,255,255,0.9)">Vault (UAE)</text>
  <text x="1060" y="250" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800" fill="#0066FF">~5.4%</text>

  <!-- Detail text -->
  <text x="920" y="290" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.35)">Vault earns more than Revolut UK</text>
  <text x="920" y="315" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.25)">And it's available in the UAE now.</text>

  <!-- Footer -->
  <text x="100" y="395" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.18)">Rates variable. Vault earns from institutional lending fees — not guaranteed. vlt.money</text>
</svg>
