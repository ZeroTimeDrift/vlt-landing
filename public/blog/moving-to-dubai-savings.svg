<svg width="1200" height="420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="0.5" fill="rgba(255,255,255,0.04)"/>
    </pattern>
    <linearGradient id="vaultBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#00A3FF"/>
    </linearGradient>
    <linearGradient id="dimBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="420" fill="#020810"/>
  <rect width="1200" height="420" fill="url(#grid)"/>
  <ellipse cx="900" cy="200" rx="400" ry="200" fill="rgba(0,102,255,0.03)"/>

  <text x="100" y="52" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" letter-spacing="0.12em" fill="rgba(255,255,255,0.25)">MOVING TO DUBAI — SAVINGS GUIDE</text>
  <text x="100" y="88" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="rgba(255,255,255,0.9)">Your UK savings setup doesn't follow you.</text>
  <text x="100" y="118" font-family="Inter, system-ui, sans-serif" font-size="17" font-weight="500" fill="rgba(255,255,255,0.45)">ISAs, Premium Bonds, NS&I — none work for UAE residents.</text>

  <!-- What changes -->
  <rect x="80" y="145" width="270" height="130" rx="10" fill="rgba(239,68,68,0.05)" stroke="rgba(239,68,68,0.15)" stroke-width="1"/>
  <text x="100" y="170" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="0.08em" fill="rgba(239,68,68,0.6)">UK OPTIONS THAT CLOSE</text>
  <text x="100" y="192" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.45)">✗ Cash ISA (non-resident)</text>
  <text x="100" y="212" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.45)">✗ NS&amp;I Premium Bonds (new)</text>
  <text x="100" y="232" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.45)">✗ Marcus, Chase UK savings</text>
  <text x="100" y="252" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.45)">✗ UK pension contributions</text>

  <!-- What replaces -->
  <rect x="370" y="145" width="290" height="130" rx="10" fill="rgba(16,185,129,0.05)" stroke="rgba(16,185,129,0.15)" stroke-width="1"/>
  <text x="390" y="170" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="0.08em" fill="rgba(16,185,129,0.6)">UAE OPTIONS THAT WORK</text>
  <text x="390" y="192" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.45)">✓ StashAway Simple: 3.9%</text>
  <text x="390" y="212" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.45)">✓ Sarwa Save+ (net): ~3.2%</text>
  <text x="390" y="232" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.45)">✓ Wio flexible: 3.25% AED</text>
  <text x="390" y="252" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.6)">✓ Vault: ~5.4% (variable)</text>

  <!-- Vault bar -->
  <rect x="80" y="296" width="580" height="48" rx="10" fill="rgba(0,102,255,0.07)" stroke="rgba(0,102,255,0.25)" stroke-width="1.5"/>
  <text x="100" y="317" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="rgba(255,255,255,0.9)">Vault — built for UAE residents. No salary routing. No minimum.</text>
  <text x="100" y="333" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.3)">~5.4% current (variable) — fees from institutional borrowers</text>

  <!-- Right callout -->
  <rect x="740" y="110" width="360" height="240" rx="16" fill="rgba(0,102,255,0.05)" stroke="rgba(0,102,255,0.12)" stroke-width="1.5"/>
  <rect x="740" y="110" width="360" height="3" rx="2" fill="url(#vaultBar)"/>
  <text x="920" y="155" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" letter-spacing="0.1em" fill="rgba(255,255,255,0.3)">RATE GAP — UK VS UAE</text>
  <text x="920" y="205" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" fill="rgba(255,255,255,0.4)">Marcus UK: ~4.75%</text>
  <text x="920" y="230" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="rgba(239,68,68,0.6)">↓ not available to UAE residents</text>
  <text x="920" y="265" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" fill="rgba(255,255,255,0.7)">Vault: ~5.4%</text>
  <text x="920" y="290" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="rgba(16,185,129,0.7)">↑ available, no UK residency needed</text>
  <text x="920" y="325" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.2)">vlt.money — join the waitlist</text>

  <text x="100" y="395" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.18)">Rates variable. Vault earns from institutional lending fees — not guaranteed. vlt.money</text>
</svg>
