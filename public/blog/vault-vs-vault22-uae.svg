  <rect x="60" y="60" width="480" height="3" rx="20" fill="url(#blueGrad)"/>

  <!-- Right panel: Vault22 -->
  <rect x="660" y="60" width="480" height="300" rx="20" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>

