<svg width="1200" height="420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.6" fill="rgba(255,255,255,0.04)"/>
    </pattern>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#00A3FF"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="420" fill="#020810"/>
  <rect width="1200" height="420" fill="url(#dots)"/>
  <ellipse cx="600" cy="210" rx="500" ry="160" fill="rgba(0,102,255,0.03)"/>

  <!-- Title -->
  <text x="600" y="54" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="0.12em" fill="rgba(255,255,255,0.3)">RATE COMPARISON</text>

  <!-- FAB card (left, fading) -->
  <rect x="160" y="100" width="340" height="220" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(239,68,68,0.2)" stroke-width="1.5"/>

  <!-- FAB header -->
  <text x="330" y="140" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.5)">FAB Savings</text>
  <text x="330" y="160" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.25)">Promotional rate</text>

  <!-- FAB rate crossing out -->
  <text x="330" y="210" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="rgba(239,68,68,0.3)">4.00%</text>
  <line x1="230" y1="200" x2="430" y2="200" stroke="#EF4444" stroke-width="2.5"/>

  <!-- New FAB rate -->
  <text x="330" y="250" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="rgba(255,255,255,0.4)">~2.5%</text>
  <text x="330" y="272" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.2)">after March 31</text>

  <!-- Expiry badge -->
  <rect x="275" y="286" width="110" height="22" rx="11" fill="rgba(239,68,68,0.15)" stroke="rgba(239,68,68,0.3)" stroke-width="1"/>
  <text x="330" y="301" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#EF4444">EXPIRES MAR 31</text>

  <!-- Arrow -->
  <text x="580" y="210" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="28" fill="rgba(255,255,255,0.15)">→</text>

  <!-- Vault card (right, highlighted) -->
  <rect x="680" y="100" width="340" height="220" rx="16" fill="rgba(0,102,255,0.07)" stroke="#0066FF" stroke-width="1.5"/>
  <rect x="680" y="100" width="340" height="3" rx="16" fill="url(#blueGrad)"/>

  <!-- Vault header -->
  <circle cx="850" cy="135" r="16" fill="rgba(0,102,255,0.15)" stroke="rgba(0,102,255,0.4)" stroke-width="1"/>
  <text x="850" y="141" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="800" fill="#0066FF">V</text>
  <text x="850" y="168" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.35)">Current rate</text>

  <!-- Vault rate -->
  <text x="850" y="218" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="#0066FF">~5.4%</text>

  <!-- Vault details -->
  <text x="850" y="252" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.5)">No lock-in. No expiry.</text>
  <text x="850" y="272" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.25)">Variable rate, earned from vetted lending markets</text>

  <!-- Active badge -->
  <rect x="805" y="286" width="90" height="22" rx="11" fill="rgba(16,185,129,0.15)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <text x="850" y="301" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#10B981">ALWAYS ON</text>

  <!-- Footer -->
  <text x="600" y="380" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.25)">Promotional rates end. Vault doesn't play that game.</text>
</svg>
