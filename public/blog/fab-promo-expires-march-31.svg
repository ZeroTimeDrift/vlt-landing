<svg width="1200" height="420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.6" fill="rgba(255,255,255,0.04)"/>
    </pattern>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#00A3FF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="420" fill="#020810"/>
  <rect width="1200" height="420" fill="url(#dots)"/>
  <ellipse cx="600" cy="210" rx="520" ry="160" fill="rgba(0,102,255,0.02)"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" letter-spacing="0.12em" fill="rgba(255,255,255,0.25)">FAB iSAVE — WHAT THE 4% ACTUALLY COVERS</text>

  <!-- FAB headline card (left) — what FAB advertises -->
  <rect x="80" y="80" width="310" height="240" rx="20" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <text x="235" y="116" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.3)">HEADLINE RATE</text>
  <text x="235" y="168" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" fill="rgba(255,255,255,0.55)">4%</text>
  <text x="235" y="192" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.22)">FAB iSave advertised rate</text>
  <line x1="115" y1="212" x2="355" y2="212" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="235" y="234" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.18)">New funds only</text>
  <text x="235" y="252" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.18)">Above Apr 2023 base balance</text>
  <text x="235" y="270" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.18)">Payout delayed to Aug 2026</text>
  <rect x="170" y="288" width="130" height="20" rx="10" fill="rgba(255,170,0,0.1)" stroke="rgba(255,170,0,0.25)" stroke-width="1"/>
  <text x="235" y="302" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="rgba(255,170,0,0.65)">CONDITIONS APPLY</text>

  <!-- Middle divider + vs -->
  <text x="468" y="204" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.12)">vs</text>

  <!-- FAB reality card (centre) — what most depositors actually earn -->
  <rect x="412" y="80" width="310" height="240" rx="20" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
  <text x="567" y="116" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.22)">EXISTING DEPOSITORS</text>
  <text x="567" y="168" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" fill="rgba(255,255,255,0.22)">~2.5%</text>
  <text x="567" y="192" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.18)">Standard prevailing rate</text>
  <line x1="447" y1="212" x2="687" y2="212" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="567" y="234" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.15)">Balance held before Apr 2023</text>
  <text x="567" y="252" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.15)">earns no campaign differential</text>
  <text x="567" y="270" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.15)">most savers are in this group</text>
  <rect x="522" y="288" width="90" height="20" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="567" y="302" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="rgba(255,255,255,0.2)">MOST SAVERS</text>

  <!-- Vault card (right, highlighted) -->
  <rect x="790" y="80" width="330" height="240" rx="20" fill="rgba(0,102,255,0.08)" stroke="#0066FF" stroke-width="1.5"/>
  <rect x="790" y="80" width="330" height="3" rx="20" fill="url(#blueGrad)"/>
  <circle cx="955" cy="116" r="14" fill="rgba(0,102,255,0.15)" stroke="rgba(0,102,255,0.4)" stroke-width="1"/>
  <text x="955" y="121" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="800" fill="#0066FF">V</text>
  <text x="955" y="168" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" fill="#0066FF">~5.4%</text>
  <text x="955" y="192" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">Current rate — all your funds</text>
  <line x1="825" y1="212" x2="1085" y2="212" stroke="rgba(0,102,255,0.15)" stroke-width="1"/>
  <text x="955" y="234" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">No base-balance conditions</text>
  <text x="955" y="252" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">No delayed payout</text>
  <text x="955" y="270" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">No expiry date</text>
  <rect x="905" y="288" width="100" height="20" rx="10" fill="rgba(16,185,129,0.12)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <text x="955" y="302" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#10B981">NO CONDITIONS</text>

  <!-- Footer -->
  <text x="600" y="378" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.18)">FAB iSave campaign runs through June 30, 2026. 4% rate on new funds only (above Apr 2023 balance). Existing funds earn ~2.465% standard rate.</text>
  <text x="600" y="396" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.12)">Rates variable. Vault earns from institutional lending fees — not guaranteed. vlt.money</text>
</svg>
