<svg width="1200" height="420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.6" fill="rgba(255,255,255,0.04)"/>
    </pattern>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#00A3FF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="420" fill="#020810"/>
  <rect width="1200" height="420" fill="url(#dots)"/>
  <ellipse cx="600" cy="210" rx="560" ry="180" fill="rgba(0,102,255,0.02)"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="0.12em" fill="rgba(255,255,255,0.3)">THE PROMO RATE LIFECYCLE</text>

  <!-- Timeline bar -->
  <rect x="120" y="198" width="960" height="4" rx="2" fill="rgba(255,255,255,0.06)"/>

  <!-- Phase 1: Launch -->
  <circle cx="220" cy="200" r="8" fill="#0066FF"/>
  <rect x="170" y="100" width="100" height="70" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="220" y="128" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="rgba(255,255,255,0.7)">Launch</text>
  <text x="220" y="148" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800" fill="#10B981">5%+</text>
  <text x="220" y="166" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.3)">"Limited time!"</text>
  <line x1="220" y1="170" x2="220" y2="192" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Phase 2: Customers locked in -->
  <circle cx="420" cy="200" r="8" fill="rgba(255,200,0,0.6)"/>
  <rect x="370" y="230" width="100" height="70" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="420" y="258" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.5)">6 months</text>
  <text x="420" y="278" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.3)">Users deposit,</text>
  <text x="420" y="294" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.3)">settle in</text>
  <line x1="420" y1="204" x2="420" y2="230" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Phase 3: Quiet cut -->
  <circle cx="640" cy="200" r="8" fill="rgba(239,68,68,0.5)"/>
  <rect x="590" y="100" width="100" height="70" rx="8" fill="rgba(239,68,68,0.05)" stroke="rgba(239,68,68,0.15)" stroke-width="1"/>
  <text x="640" y="128" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.5)">Rate cut</text>
  <text x="640" y="150" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800" fill="rgba(239,68,68,0.7)">2.5%</text>
  <text x="640" y="166" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.25)">small print</text>
  <line x1="640" y1="170" x2="640" y2="192" stroke="rgba(239,68,68,0.2)" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Phase 4: Forgotten -->
  <circle cx="860" cy="200" r="8" fill="rgba(239,68,68,0.3)"/>
  <rect x="810" y="230" width="100" height="70" rx="8" fill="rgba(239,68,68,0.03)" stroke="rgba(239,68,68,0.1)" stroke-width="1"/>
  <text x="860" y="258" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.35)">Now</text>
  <text x="860" y="278" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.25)">You're still</text>
  <text x="860" y="294" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(239,68,68,0.5)">earning 2.5%</text>
  <line x1="860" y1="204" x2="860" y2="230" stroke="rgba(239,68,68,0.15)" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Vault badge -->
  <rect x="980" y="172" width="100" height="56" rx="10" fill="rgba(0,102,255,0.1)" stroke="rgba(0,102,255,0.3)" stroke-width="1"/>
  <rect x="980" y="172" width="100" height="3" rx="10" fill="url(#blueGrad)"/>
  <text x="1030" y="200" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="white">Vault</text>
  <text x="1030" y="216" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(0,153,255,0.7)">no promo games</text>

  <!-- Footer -->
  <text x="600" y="380" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.2)">Promo rates are a marketing tool. Not a savings strategy.</text>
</svg>
