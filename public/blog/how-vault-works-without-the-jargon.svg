<svg width="1200" height="420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.6" fill="rgba(255,255,255,0.04)"/>
    </pattern>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#00A3FF"/>
    </linearGradient>
    <linearGradient id="returnGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(0,163,255,0)"/>
      <stop offset="50%" stop-color="rgba(0,102,255,0.3)"/>
      <stop offset="100%" stop-color="rgba(0,163,255,0)"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#0066FF"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="420" fill="#020810"/>
  <rect width="1200" height="420" fill="url(#dots)"/>
  <ellipse cx="600" cy="210" rx="600" ry="180" fill="rgba(0,102,255,0.04)"/>

  <!-- Title -->
  <text x="600" y="54" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="0.12em" fill="rgba(255,255,255,0.3)">HOW VAULT WORKS</text>

  <!-- Step 1: You Deposit -->
  <rect x="54" y="110" width="200" height="140" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <circle cx="154" cy="148" r="20" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="154" y="154" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" fill="rgba(255,255,255,0.7)">$</text>
  <text x="154" y="186" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="rgba(255,255,255,0.9)">You deposit</text>
  <text x="154" y="208" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">any amount</text>
  <text x="154" y="232" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.2)" letter-spacing="0.08em">STEP 1</text>

  <!-- Arrow 1→2 -->
  <line x1="256" y1="180" x2="334" y2="180" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Step 2: Vault deploys -->
  <rect x="336" y="90" width="200" height="180" rx="12" fill="rgba(0,102,255,0.07)" stroke="#0066FF" stroke-width="1.5"/>
  <rect x="336" y="90" width="200" height="3" rx="12" fill="url(#blueGrad)"/>
  <circle cx="436" cy="136" r="22" fill="rgba(0,102,255,0.15)" stroke="rgba(0,102,255,0.4)" stroke-width="1"/>
  <text x="436" y="143" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800" fill="#0066FF">V</text>
  <text x="436" y="172" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="white">Vault</text>
  <text x="436" y="194" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.45)">selects &amp; manages</text>
  <text x="436" y="214" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.35)">vetted markets</text>
  <text x="436" y="250" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="rgba(0,102,255,0.6)" letter-spacing="0.08em">STEP 2</text>

  <!-- Arrow 2→3 -->
  <line x1="538" y1="180" x2="616" y2="180" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Step 3: Lending Markets -->
  <rect x="618" y="110" width="200" height="140" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <circle cx="718" cy="148" r="20" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="718" y="154" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.6)">⇄</text>
  <text x="718" y="186" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="rgba(255,255,255,0.9)">Markets earn</text>
  <text x="718" y="208" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">borrowers pay fees</text>
  <text x="718" y="232" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.2)" letter-spacing="0.08em">STEP 3</text>

  <!-- Arrow 3→4 -->
  <line x1="820" y1="180" x2="898" y2="180" stroke="rgba(0,102,255,0.7)" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Step 4: You earn -->
  <rect x="900" y="90" width="246" height="180" rx="12" fill="rgba(0,102,255,0.07)" stroke="#0066FF" stroke-width="1.5"/>
  <rect x="900" y="90" width="246" height="3" rx="12" fill="url(#blueGrad)"/>
  <text x="1023" y="138" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="40" font-weight="800" fill="#0066FF">~4%</text>
  <text x="1023" y="168" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.5)">annual return</text>
  <text x="1023" y="196" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="white">flows back to you</text>
  <text x="1023" y="250" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="rgba(0,102,255,0.6)" letter-spacing="0.08em">STEP 4</text>

  <!-- Return flow arc annotation -->
  <rect x="300" y="340" width="600" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="600" y="375" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.25)">No jargon. No DeFi. Just your money working harder.</text>
  <text x="600" y="408" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.18)">vlt.money</text>
</svg>
