<svg width="1200" height="420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.6" fill="rgba(255,255,255,0.04)"/>
    </pattern>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#00A3FF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="420" fill="#020810"/>
  <rect width="1200" height="420" fill="url(#dots)"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="0.12em" fill="rgba(255,255,255,0.3)">CUSTODIAL vs NON-CUSTODIAL</text>

  <!-- Divider line -->
  <line x1="600" y1="70" x2="600" y2="390" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="4 6"/>

  <!-- LEFT SIDE: Traditional Bank -->
  <text x="300" y="96" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="rgba(255,255,255,0.4)">Traditional Bank</text>

  <!-- Your money node -->
  <rect x="80" y="112" width="150" height="60" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="155" y="138" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.5)">Your Money</text>
  <text x="155" y="158" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="rgba(255,255,255,0.8)">$10,000</text>

  <!-- Arrow down with label -->
  <line x1="155" y1="174" x2="155" y2="206" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <polygon points="149,206 155,216 161,206" fill="rgba(255,255,255,0.2)"/>
  <text x="185" y="198" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.25)">bank takes custody</text>

  <!-- Bank custody box -->
  <rect x="80" y="218" width="150" height="60" rx="10" fill="rgba(255,80,80,0.06)" stroke="rgba(255,80,80,0.15)" stroke-width="1"/>
  <text x="155" y="244" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,120,120,0.7)">Bank Controls</text>
  <text x="155" y="264" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="rgba(255,120,120,0.8)">Your Funds</text>

  <!-- Risk annotation -->
  <rect x="270" y="218" width="260" height="112" rx="10" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="400" y="244" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="rgba(255,255,255,0.5)">If bank fails:</text>
  <text x="290" y="268" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.35)">• You're an unsecured creditor</text>
  <text x="290" y="288" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.35)">• FDIC covers up to $250k only</text>
  <text x="290" y="308" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.35)">• Exposure above that limit</text>

  <!-- RIGHT SIDE: Vault -->
  <text x="900" y="96" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#0066FF">Vault</text>

  <!-- Your money node -->
  <rect x="970" y="112" width="150" height="60" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="1045" y="138" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.5)">Your Money</text>
  <text x="1045" y="158" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="rgba(255,255,255,0.8)">$10,000</text>

  <!-- Arrow down with label -->
  <line x1="1045" y1="174" x2="1045" y2="206" stroke="#0066FF" stroke-width="1.5"/>
  <polygon points="1039,206 1045,216 1051,206" fill="#0066FF"/>
  <text x="860" y="198" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(0,153,255,0.6)">deployed directly, your control</text>

  <!-- Markets box -->
  <rect x="970" y="218" width="150" height="60" rx="10" fill="rgba(0,102,255,0.08)" stroke="rgba(0,102,255,0.25)" stroke-width="1"/>
  <text x="1045" y="244" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(0,153,255,0.7)">Lending Markets</text>
  <text x="1045" y="264" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="rgba(0,153,255,0.9)">Hold Funds</text>

  <!-- Benefit annotation -->
  <rect x="670" y="218" width="260" height="112" rx="10" fill="rgba(0,102,255,0.04)" stroke="rgba(0,102,255,0.1)" stroke-width="1"/>
  <text x="800" y="244" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="rgba(255,255,255,0.5)">Vault never holds principal:</text>
  <text x="690" y="268" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.5)">• Can't misappropriate your funds</text>
  <text x="690" y="288" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.5)">• Vault failure ≠ funds disappear</text>
  <text x="690" y="308" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.5)">• No exposure to Vault's balance sheet</text>

  <!-- Bottom summary bar -->
  <rect x="160" y="356" width="880" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="600" y="390" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.25)">Non-custodial is a structural commitment — not a marketing term.</text>
  <text x="600" y="408" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.18)">vlt.money</text>
</svg>
