<svg width="1200" height="420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.6" fill="rgba(255,255,255,0.04)"/>
    </pattern>
    <linearGradient id="blueBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#0044BB"/>
    </linearGradient>
    <linearGradient id="grayBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.06)"/>
    </linearGradient>
    <linearGradient id="dimBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.03)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="420" fill="#020810"/>
  <rect width="1200" height="420" fill="url(#dots)"/>

  <!-- Title -->
  <text x="600" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="0.12em" fill="rgba(255,255,255,0.3)">THE RATE GAP — WHERE DOES YOUR MONEY GO?</text>

  <!-- Chart area -->
  <!-- Baseline -->
  <line x1="220" y1="320" x2="980" y2="320" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Grid lines -->
  <line x1="220" y1="252" x2="980" y2="252" stroke="rgba(255,255,255,0.04)" stroke-width="1" stroke-dasharray="4 6"/>
  <line x1="220" y1="184" x2="980" y2="184" stroke="rgba(255,255,255,0.04)" stroke-width="1" stroke-dasharray="4 6"/>
  <line x1="220" y1="116" x2="980" y2="116" stroke="rgba(255,255,255,0.04)" stroke-width="1" stroke-dasharray="4 6"/>

  <!-- Y-axis labels -->
  <text x="208" y="324" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.2)">0%</text>
  <text x="208" y="256" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.2)">2%</text>
  <text x="208" y="188" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.2)">4%</text>
  <text x="208" y="120" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.2)">6%</text>

  <!-- Bar 1: Your savings account 0.5% -->
  <!-- 0.5% of max 10% = 5% of chart height (204px height at full = 10%) = 10.2px -->
  <rect x="290" y="309" width="140" height="11" rx="3" fill="url(#dimBar)"/>
  <text x="360" y="300" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800" fill="rgba(255,255,255,0.4)">0.5%</text>
  <text x="360" y="344" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.3)">Your savings</text>
  <text x="360" y="360" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.2)">account rate</text>

  <!-- Bar 2: Vault ~4% -->
  <!-- 4% of 10% = 40% of 204 = 81.6px tall -->
  <rect x="530" y="238" width="140" height="82" rx="3" fill="url(#blueBar)"/>
  <!-- Blue glow -->
  <rect x="530" y="238" width="140" height="4" rx="3" fill="rgba(0,163,255,0.6)"/>
  <text x="600" y="228" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="800" fill="#0066FF">~4%</text>
  <text x="600" y="344" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="rgba(0,153,255,0.9)">Vault</text>
  <text x="600" y="360" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(0,153,255,0.6)">annual return</text>

  <!-- Bar 3: Bank earns 8-10% -->
  <!-- 9% of 10% = 90% of 204 = 183.6px tall -->
  <rect x="770" y="136" width="140" height="184" rx="3" fill="url(#grayBar)"/>
  <text x="840" y="126" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="800" fill="rgba(255,255,255,0.6)">8–10%</text>
  <text x="840" y="344" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">Bank earns</text>
  <text x="840" y="360" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.25)">on your deposits</text>

  <!-- Gap annotation -->
  <line x1="910" y1="136" x2="960" y2="136" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="910" y1="238" x2="960" y2="238" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="960" y1="136" x2="960" y2="238" stroke="rgba(255,80,80,0.3)" stroke-width="1.5"/>
  <text x="975" y="188" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,100,100,0.6)">bank</text>
  <text x="975" y="202" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,100,100,0.6)">profit</text>

  <!-- Bottom note -->
  <text x="600" y="398" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.2)">On $10,000: bank keeps ~$750/yr in spread while paying you $50. Vault passes the yield to you.</text>
  <text x="600" y="415" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.18)">Rate variable, not guaranteed · vlt.money</text>
</svg>
