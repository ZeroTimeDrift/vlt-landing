<svg width="1200" height="420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.6" fill="rgba(255,255,255,0.04)"/>
    </pattern>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#00A3FF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="420" fill="#020810"/>
  <rect width="1200" height="420" fill="url(#dots)"/>
  <ellipse cx="600" cy="200" rx="480" ry="170" fill="rgba(0,102,255,0.03)"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="0.12em" fill="rgba(255,255,255,0.3)">UAE END-OF-SERVICE GRATUITY</text>

  <!-- Gratuity amount central -->
  <text x="600" y="118" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.35)">You receive a lump sum — what do you do with it?</text>

  <!-- 3 options laid out -->
  <!-- Option 1: Leave in bank (bad) -->
  <rect x="80" y="140" width="280" height="200" rx="14" fill="rgba(255,255,255,0.02)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <text x="220" y="178" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.5)">Leave it in your bank</text>
  <text x="220" y="220" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="rgba(239,68,68,0.4)">0–1%</text>
  <text x="220" y="244" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.25)">current account</text>
  <text x="220" y="280" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(239,68,68,0.5)">Inflation eats it quietly</text>
  <rect x="155" y="300" width="130" height="22" rx="11" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <text x="220" y="315" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="rgba(239,68,68,0.6)">NOT RECOMMENDED</text>

  <!-- Option 2: Term deposit -->
  <rect x="460" y="140" width="280" height="200" rx="14" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="600" y="178" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.5)">12-month term deposit</text>
  <text x="600" y="220" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="rgba(255,255,255,0.4)">~4%</text>
  <text x="600" y="244" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.25)">locked 12 months</text>
  <text x="600" y="280" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,200,0,0.5)">OK rate, no flexibility</text>
  <rect x="535" y="300" width="130" height="22" rx="11" fill="rgba(255,200,0,0.06)" stroke="rgba(255,200,0,0.2)" stroke-width="1"/>
  <text x="600" y="315" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="rgba(255,200,0,0.5)">IF YOU WON'T NEED IT</text>

  <!-- Option 3: Vault (best) -->
  <rect x="840" y="140" width="280" height="200" rx="14" fill="rgba(0,102,255,0.08)" stroke="#0066FF" stroke-width="1.5"/>
  <rect x="840" y="140" width="280" height="3" rx="14" fill="url(#blueGrad)"/>
  <text x="980" y="178" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.6)">Vault</text>
  <text x="980" y="220" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#0066FF">~5.4%</text>
  <text x="980" y="244" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.35)">withdraw anytime</text>
  <text x="980" y="280" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(16,185,129,0.7)">Best rate + full flexibility</text>
  <rect x="915" y="300" width="130" height="22" rx="11" fill="rgba(16,185,129,0.08)" stroke="rgba(16,185,129,0.25)" stroke-width="1"/>
  <text x="980" y="315" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#10B981">RECOMMENDED</text>

  <!-- Footer -->
  <text x="600" y="388" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.2)">Gratuity is earned. Make it work while you plan what's next.</text>
</svg>
