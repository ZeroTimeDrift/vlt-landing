<svg width="1200" height="420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.6" fill="rgba(255,255,255,0.04)"/>
    </pattern>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#00A3FF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="420" fill="#020810"/>
  <rect width="1200" height="420" fill="url(#dots)"/>
  <ellipse cx="600" cy="210" rx="500" ry="160" fill="rgba(0,102,255,0.03)"/>

  <!-- Label -->
  <text x="600" y="52" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="0.12em" fill="rgba(255,255,255,0.3)">HOME DEPOSIT — UAE EXPAT GUIDE</text>

  <text x="600" y="88" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.3)">What AED 200,000 earns over 3 years</text>

  <!-- Comparison table -->
  <rect x="100" y="106" width="1000" height="230" rx="12" fill="rgba(255,255,255,0.01)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Header -->
  <text x="280" y="135" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.3)">Product</text>
  <text x="520" y="135" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.3)">Rate</text>
  <text x="720" y="135" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.3)">Lock-in</text>
  <text x="940" y="135" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.3)">3-year earnings</text>

  <line x1="120" y1="145" x2="1080" y2="145" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Row 1: Current account -->
  <text x="280" y="170" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">UAE current account</text>
  <text x="520" y="170" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(239,68,68,0.6)">0.5%</text>
  <text x="720" y="170" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(16,185,129,0.5)">None</text>
  <text x="940" y="170" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(239,68,68,0.5)">~AED 3,000</text>

  <!-- Row 2: UAE savings -->
  <text x="280" y="200" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">UAE flexible savings</text>
  <text x="520" y="200" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,200,0,0.5)">1.5%</text>
  <text x="720" y="200" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(16,185,129,0.5)">None</text>
  <text x="940" y="200" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,200,0,0.5)">~AED 9,100</text>

  <!-- Row 3: Term deposit -->
  <text x="280" y="230" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">UAE term deposit</text>
  <text x="520" y="230" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,200,0,0.5)">4%</text>
  <text x="720" y="230" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(239,68,68,0.5)">12 months</text>
  <text x="940" y="230" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,200,0,0.5)">~AED 24,970 (locked)</text>

  <!-- Row 4: StashAway -->
  <text x="280" y="260" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">StashAway Simple UAE</text>
  <text x="520" y="260" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,200,0,0.6)">3.6%</text>
  <text x="720" y="260" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(16,185,129,0.5)">None</text>
  <text x="940" y="260" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,200,0,0.6)">~AED 23,780</text>

  <!-- Row 5: Vault (highlighted) -->
  <rect x="110" y="274" width="970" height="38" rx="6" fill="rgba(0,102,255,0.06)" stroke="rgba(0,102,255,0.15)" stroke-width="1"/>
  <text x="280" y="298" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="white">Vault</text>
  <text x="520" y="298" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#0066FF">~5.4%</text>
  <text x="720" y="298" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(16,185,129,0.7)">None</text>
  <text x="940" y="298" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#10B981">~AED 33,030</text>

  <!-- Footer note -->
  <text x="600" y="380" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.2)">~AED 24,000 more than a standard savings account. Available when you need it.</text>
  <text x="600" y="400" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.12)">Rate variable, not guaranteed. vlt.money</text>
</svg>
