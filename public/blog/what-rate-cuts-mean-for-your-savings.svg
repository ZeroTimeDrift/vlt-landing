<svg width="1200" height="420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.6" fill="rgba(255,255,255,0.04)"/>
    </pattern>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#00A3FF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="420" fill="#020810"/>
  <rect width="1200" height="420" fill="url(#dots)"/>
  <ellipse cx="600" cy="210" rx="550" ry="170" fill="rgba(0,102,255,0.03)"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="0.12em" fill="rgba(255,255,255,0.3)">RATE CUTS &amp; YOUR SAVINGS</text>

  <!-- Chart area -->
  <rect x="120" y="80" width="960" height="240" rx="12" fill="rgba(255,255,255,0.01)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Y axis labels -->
  <text x="150" y="112" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.2)">6%</text>
  <text x="150" y="172" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.2)">4%</text>
  <text x="150" y="232" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.2)">2%</text>
  <text x="150" y="292" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.2)">0%</text>

  <!-- Grid lines -->
  <line x1="176" y1="108" x2="1060" y2="108" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="176" y1="168" x2="1060" y2="168" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="176" y1="228" x2="1060" y2="228" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="176" y1="288" x2="1060" y2="288" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- X axis labels -->
  <text x="220" y="308" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.2)">Q1 2025</text>
  <text x="440" y="308" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.2)">Q2 2025</text>
  <text x="660" y="308" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.2)">Q3 2025</text>
  <text x="880" y="308" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.2)">Q4 2025</text>

  <!-- Bank savings line (goes down with rate cuts) -->
  <polyline points="200,168 330,178 460,195 590,215 720,235 850,248 980,258" fill="none" stroke="rgba(239,68,68,0.5)" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Vault line (stays relatively stable) -->
  <polyline points="200,128 330,122 460,118 590,120 720,115 850,118 980,120" fill="none" stroke="#0066FF" stroke-width="2.5"/>

  <!-- Vault area fill -->
  <polygon points="200,128 330,122 460,118 590,120 720,115 850,118 980,120 980,288 200,288" fill="rgba(0,102,255,0.04)"/>

  <!-- Labels on chart -->
  <rect x="850" y="96" width="120" height="22" rx="11" fill="rgba(0,102,255,0.15)" stroke="rgba(0,102,255,0.4)" stroke-width="1"/>
  <text x="910" y="111" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#0066FF">Vault ~5.4%</text>

  <rect x="850" y="240" width="130" height="22" rx="11" fill="rgba(239,68,68,0.1)" stroke="rgba(239,68,68,0.3)" stroke-width="1"/>
  <text x="915" y="255" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="rgba(239,68,68,0.8)">Bank rate falls</text>

  <!-- Arrow on bank line going down -->
  <text x="970" y="270" font-family="Inter, system-ui, sans-serif" font-size="16" fill="rgba(239,68,68,0.6)">↘</text>

  <!-- Footer -->
  <text x="600" y="380" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.2)">Bank rates track central bank cuts. Vault earns from borrower demand — a different driver.</text>
</svg>
