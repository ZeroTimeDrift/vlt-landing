<svg width="1200" height="420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.6" fill="rgba(255,255,255,0.04)"/>
    </pattern>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#00A3FF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="420" fill="#020810"/>
  <rect width="1200" height="420" fill="url(#dots)"/>
  <ellipse cx="600" cy="210" rx="500" ry="160" fill="rgba(0,102,255,0.03)"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="0.12em" fill="rgba(255,255,255,0.3)">UAE EMERGENCY FUND</text>

  <!-- Key requirement pills -->
  <text x="600" y="88" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.3)">What your emergency fund needs to be</text>

  <rect x="200" y="104" width="130" height="30" rx="15" fill="rgba(0,102,255,0.1)" stroke="rgba(0,102,255,0.25)" stroke-width="1"/>
  <text x="265" y="123" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#0066FF">Accessible</text>

  <rect x="350" y="104" width="130" height="30" rx="15" fill="rgba(0,102,255,0.1)" stroke="rgba(0,102,255,0.25)" stroke-width="1"/>
  <text x="415" y="123" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#0066FF">Earning something</text>

  <rect x="500" y="104" width="130" height="30" rx="15" fill="rgba(0,102,255,0.1)" stroke="rgba(0,102,255,0.25)" stroke-width="1"/>
  <text x="565" y="123" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#0066FF">3–6 months</text>

  <rect x="650" y="104" width="130" height="30" rx="15" fill="rgba(0,102,255,0.1)" stroke="rgba(0,102,255,0.25)" stroke-width="1"/>
  <text x="715" y="123" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#0066FF">Low risk</text>

  <rect x="800" y="104" width="160" height="30" rx="15" fill="rgba(0,102,255,0.1)" stroke="rgba(0,102,255,0.25)" stroke-width="1"/>
  <text x="880" y="123" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#0066FF">Not locked in</text>

  <!-- Options comparison table -->
  <rect x="100" y="152" width="1000" height="200" rx="12" fill="rgba(255,255,255,0.01)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Header row -->
  <text x="220" y="180" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.3)">Option</text>
  <text x="400" y="180" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.3)">Rate</text>
  <text x="580" y="180" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.3)">Accessible?</text>
  <text x="760" y="180" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.3)">Lock-in?</text>
  <text x="950" y="180" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.3)">Verdict</text>

  <line x1="120" y1="190" x2="1080" y2="190" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Row 1: Current account -->
  <text x="220" y="214" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">Current account</text>
  <text x="400" y="214" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(239,68,68,0.6)">0–1%</text>
  <text x="580" y="214" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(16,185,129,0.5)">✓ instant</text>
  <text x="760" y="214" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(16,185,129,0.5)">✓ none</text>
  <text x="950" y="214" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(239,68,68,0.5)">Losing to inflation</text>

  <!-- Row 2: Term deposit -->
  <text x="220" y="244" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">Term deposit</text>
  <text x="400" y="244" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,200,0,0.5)">~4%</text>
  <text x="580" y="244" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(239,68,68,0.5)">✗ locked</text>
  <text x="760" y="244" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(239,68,68,0.5)">✗ 12 months</text>
  <text x="950" y="244" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,200,0,0.5)">Too illiquid</text>

  <!-- Row 3: Vault (highlighted) -->
  <rect x="110" y="258" width="970" height="34" rx="6" fill="rgba(0,102,255,0.06)" stroke="rgba(0,102,255,0.15)" stroke-width="1"/>
  <text x="220" y="280" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="white">Vault</text>
  <text x="400" y="280" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#0066FF">~5.4%</text>
  <text x="580" y="280" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(16,185,129,0.7)">✓ anytime</text>
  <text x="760" y="280" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(16,185,129,0.7)">✓ none</text>
  <text x="950" y="280" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#10B981">Best fit</text>

  <!-- Footer -->
  <text x="600" y="388" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.2)">Your emergency fund should be available instantly — and earning something.</text>
  <text x="600" y="408" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.18)">Rate variable, not guaranteed · vlt.money</text>
</svg>
