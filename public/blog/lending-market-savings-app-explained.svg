<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="420" fill="#020810"/>

  <!-- Background grid lines -->
  <line x1="0" y1="100" x2="1200" y2="100" stroke="#0a1628" stroke-width="1"/>
  <line x1="0" y1="200" x2="1200" y2="200" stroke="#0a1628" stroke-width="1"/>
  <line x1="0" y1="300" x2="1200" y2="300" stroke="#0a1628" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="420" stroke="#0a1628" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="420" stroke="#0a1628" stroke-width="1"/>
  <line x1="1000" y1="0" x2="1000" y2="420" stroke="#0a1628" stroke-width="1"/>

  <!-- Left: Bank diagram -->
  <!-- Bank box -->
  <rect x="80" y="80" width="180" height="80" rx="8" fill="#0d1f3c" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="170" y="116" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Bank</text>
  <text x="170" y="135" font-family="system-ui, sans-serif" font-size="11" fill="#475569" text-anchor="middle">takes margin</text>

  <!-- Arrow from user to bank -->
  <path d="M170 240 L170 168" stroke="#1e3a5f" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow-dim)"/>
  <!-- User box -->
  <rect x="80" y="240" width="180" height="60" rx="8" fill="#080f1e" stroke="#1e3a5f" stroke-width="1"/>
  <text x="170" y="275" font-family="system-ui, sans-serif" font-size="12" fill="#475569" text-anchor="middle">You deposit</text>

  <!-- Arrow from bank to borrower -->
  <path d="M260 120 L340 120" stroke="#1e3a5f" stroke-width="1.5" marker-end="url(#arrow-dim)"/>
  <!-- Borrower box -->
  <rect x="340" y="80" width="160" height="80" rx="8" fill="#0d1f3c" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="420" y="116" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Borrower</text>
  <text x="420" y="135" font-family="system-ui, sans-serif" font-size="11" fill="#475569" text-anchor="middle">pays 6-8%</text>

  <!-- Return arrow bank to you (small) -->
  <path d="M170 240 C 120 200 120 180 170 168" stroke="#1e3a5f" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="90" y="210" font-family="system-ui, sans-serif" font-size="10" fill="#334155">0.5–2%</text>
  <text x="90" y="222" font-family="system-ui, sans-serif" font-size="10" fill="#334155">back to you</text>

  <!-- Cross/X over bank flow -->
  <line x1="155" y1="190" x2="185" y2="220" stroke="#374151" stroke-width="1.5"/>
  <line x1="185" y1="190" x2="155" y2="220" stroke="#374151" stroke-width="1.5"/>

  <!-- Left label -->
  <text x="170" y="370" font-family="system-ui, sans-serif" font-size="12" fill="#374151" text-anchor="middle">Traditional</text>

  <!-- Divider -->
  <line x1="540" y1="60" x2="540" y2="360" stroke="#0f2040" stroke-width="2"/>
  <text x="540" y="50" font-family="system-ui, sans-serif" font-size="11" fill="#1e3a5f" text-anchor="middle">vs</text>

  <!-- Right: Stablecoin savings app diagram -->
  <!-- You box -->
  <rect x="620" y="240" width="180" height="60" rx="8" fill="#0a1f3a" stroke="#1e4d8c" stroke-width="1.5"/>
  <text x="710" y="275" font-family="system-ui, sans-serif" font-size="12" fill="#60a5fa" text-anchor="middle">You deposit</text>

  <!-- Vault/app box -->
  <rect x="620" y="130" width="180" height="80" rx="8" fill="#0d2d57" stroke="#2563eb" stroke-width="1.5"/>
  <text x="710" y="166" font-family="system-ui, sans-serif" font-size="13" fill="#93c5fd" text-anchor="middle" font-weight="600">Vault</text>
  <text x="710" y="184" font-family="system-ui, sans-serif" font-size="11" fill="#3b82f6" text-anchor="middle">no margin taken</text>

  <!-- Arrow up from user to vault -->
  <path d="M710 240 L710 218" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Arrow to borrowers -->
  <path d="M800 170 L880 170" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Borrowers box -->
  <rect x="880" y="130" width="200" height="80" rx="8" fill="#0d2d57" stroke="#1e40af" stroke-width="1.5"/>
  <text x="980" y="166" font-family="system-ui, sans-serif" font-size="13" fill="#93c5fd" text-anchor="middle">Borrowers</text>
  <text x="980" y="184" font-family="system-ui, sans-serif" font-size="11" fill="#3b82f6" text-anchor="middle">pay fees</text>

  <!-- Return arrow: borrowers to you (direct, glowing) -->
  <path d="M980 210 Q 980 310 710 310 L710 300" stroke="#22d3ee" stroke-width="2" fill="none" marker-end="url(#arrow-cyan)"/>

  <!-- Rate label -->
  <rect x="780" y="290" width="120" height="32" rx="6" fill="#0c1f3a" stroke="#0e7490" stroke-width="1"/>
  <text x="840" y="311" font-family="system-ui, sans-serif" font-size="13" fill="#22d3ee" text-anchor="middle" font-weight="600">~5.4%</text>

  <!-- Right label -->
  <text x="710" y="370" font-family="system-ui, sans-serif" font-size="12" fill="#3b82f6" text-anchor="middle">Stablecoin savings app</text>

  <!-- Defs for markers -->
  <defs>
    <marker id="arrow-dim" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1e3a5f"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22d3ee"/>
    </marker>
  </defs>
</svg>
