<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="0.5" fill="rgba(255,255,255,0.04)"/>
    </pattern>
    <marker id="arrow-dim" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="rgba(255,255,255,0.25)"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0066FF"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="420" fill="#020810"/>
  <rect width="1200" height="420" fill="url(#grid)"/>
  <ellipse cx="800" cy="200" rx="400" ry="200" fill="rgba(0,102,255,0.03)"/>

  <!-- Background grid lines -->
  <line x1="0" y1="100" x2="1200" y2="100" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="200" x2="1200" y2="200" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="300" x2="1200" y2="300" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="1000" y1="0" x2="1000" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Left: Bank diagram -->
  <!-- Bank box -->
  <rect x="80" y="80" width="180" height="80" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <text x="170" y="116" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Bank</text>
  <text x="170" y="135" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#475569" text-anchor="middle">takes margin</text>

  <!-- Arrow from user to bank -->
  <path d="M170 240 L170 168" stroke="#1e3a5f" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow-dim)"/>
  <!-- User box -->
  <rect x="80" y="240" width="180" height="60" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="170" y="275" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#475569" text-anchor="middle">You deposit</text>

  <!-- Arrow from bank to borrower -->
  <path d="M260 120 L340 120" stroke="#1e3a5f" stroke-width="1.5" marker-end="url(#arrow-dim)"/>
  <!-- Borrower box -->
  <rect x="340" y="80" width="160" height="80" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <text x="420" y="116" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Borrower</text>
  <text x="420" y="135" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#475569" text-anchor="middle">pays 6-8%</text>

  <!-- Return arrow bank to you (small) -->
  <path d="M170 240 C 120 200 120 180 170 168" stroke="#1e3a5f" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="90" y="210" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.3)">0.5–2%</text>
  <text x="90" y="222" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.3)">back to you</text>

  <!-- Cross/X over bank flow -->
  <line x1="155" y1="190" x2="185" y2="220" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <line x1="185" y1="190" x2="155" y2="220" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>

  <!-- Left label -->
  <text x="170" y="370" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.3)" text-anchor="middle">Traditional</text>

  <!-- Divider -->
  <line x1="540" y1="60" x2="540" y2="360" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  <text x="540" y="50" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.3)" text-anchor="middle">vs</text>

  <!-- Right: Stablecoin savings app diagram -->
  <!-- You box -->
  <rect x="620" y="240" width="180" height="60" rx="8" fill="rgba(0,102,255,0.05)" stroke="rgba(0,102,255,0.4)" stroke-width="1.5"/>
  <text x="710" y="275" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#0066FF" text-anchor="middle">You deposit</text>

  <!-- Vault/app box -->
  <rect x="620" y="130" width="180" height="80" rx="8" fill="rgba(0,102,255,0.1)" stroke="#0066FF" stroke-width="1.5"/>
  <text x="710" y="166" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#0066FF" text-anchor="middle" font-weight="600">Vault</text>
  <text x="710" y="184" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#0066FF" text-anchor="middle">no margin taken</text>

  <!-- Arrow up from user to vault -->
  <path d="M710 240 L710 218" stroke="#0066FF" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Arrow to borrowers -->
  <path d="M800 170 L880 170" stroke="#0066FF" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Borrowers box -->
  <rect x="880" y="130" width="200" height="80" rx="8" fill="rgba(0,102,255,0.1)" stroke="rgba(0,102,255,0.4)" stroke-width="1.5"/>
  <text x="980" y="166" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#0066FF" text-anchor="middle">Borrowers</text>
  <text x="980" y="184" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#0066FF" text-anchor="middle">pay fees</text>

  <!-- Return arrow: borrowers to you (direct) -->
  <path d="M980 210 Q 980 310 710 310 L710 300" stroke="#0066FF" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>

  <!-- Rate label -->
  <rect x="780" y="290" width="120" height="32" rx="6" fill="rgba(0,102,255,0.1)" stroke="rgba(0,102,255,0.3)" stroke-width="1"/>
  <text x="840" y="311" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#0066FF" text-anchor="middle" font-weight="600">~5.4%</text>

  <!-- Right label -->
  <text x="710" y="370" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#0066FF" text-anchor="middle">Stablecoin savings app</text>

  <!-- Footer -->
  <text x="100" y="405" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.18)">Rates variable. Vault earns from institutional lending fees — not guaranteed. vlt.money</text>
</svg>
