<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
  <rect width="1200" height="420" fill="#020810"/>
  <!-- Subtle grid lines -->
  <line x1="0" y1="140" x2="1200" y2="140" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="280" x2="1200" y2="280" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <!-- Accent bar -->
  <rect x="0" y="0" width="6" height="420" fill="#0066FF"/>
  <!-- Icon: stacked circles representing savings layers -->
  <ellipse cx="900" cy="210" rx="140" ry="40" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  <ellipse cx="900" cy="170" rx="140" ry="40" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  <ellipse cx="900" cy="130" rx="140" ry="40" fill="rgba(0,102,255,0.05)" stroke="#0066FF" stroke-width="2"/>
  <ellipse cx="900" cy="130" rx="140" ry="40" fill="none" stroke="#0066FF" stroke-width="2"/>
  <!-- Building/workplace icon simplified -->
  <rect x="820" y="220" width="160" height="90" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <rect x="840" y="240" width="30" height="30" fill="rgba(0,102,255,0.08)" stroke="rgba(0,102,255,0.25)" stroke-width="1"/>
  <rect x="885" y="240" width="30" height="30" fill="rgba(0,102,255,0.08)" stroke="rgba(0,102,255,0.25)" stroke-width="1"/>
  <rect x="930" y="240" width="30" height="30" fill="rgba(0,102,255,0.08)" stroke="rgba(0,102,255,0.25)" stroke-width="1"/>
  <rect x="880" y="270" width="40" height="40" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Text -->
  <text x="80" y="155" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="700" fill="rgba(255,255,255,0.9)" letter-spacing="-1">DEWS &amp;</text>
  <text x="80" y="220" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="700" fill="rgba(255,255,255,0.9)" letter-spacing="-1">the Savings Gap</text>
  <text x="80" y="275" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#9CA3AF" letter-spacing="0.5">What UAE Expats Miss About Workplace Savings</text>
  <!-- Vault brand -->
  <text x="80" y="370" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#0066FF" font-weight="600" letter-spacing="2">VAULT · VLT.MONEY</text>
  <text x="600" y="408" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.18)">vlt.money</text>
</svg>
