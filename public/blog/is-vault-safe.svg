<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="0.5" fill="rgba(255,255,255,0.04)"/>
    </pattern>
    <linearGradient id="vaultBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#00A3FF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="420" fill="#020810"/>
  <rect width="1200" height="420" fill="url(#grid)"/>

  <!-- Subtle ellipse glow -->
  <ellipse cx="600" cy="180" rx="700" ry="220" fill="rgba(0,102,255,0.03)"/>

  <!-- Header strip -->
  <text x="600" y="48" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" letter-spacing="0.12em" fill="rgba(255,255,255,0.25)" text-anchor="middle">IS VAULT SAFE?</text>
  <text x="600" y="70" font-family="Inter, system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.35)" text-anchor="middle">Honest answers to the questions that matter.</text>

  <!-- Card 1: Is the rate guaranteed? -->
  <rect x="70" y="95" width="330" height="240" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="235" y="130" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="0.06em" fill="rgba(255,255,255,0.3)" text-anchor="middle">Is the rate guaranteed?</text>
  <text x="235" y="190" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" fill="rgba(255,255,255,0.15)" text-anchor="middle">No</text>
  <text x="235" y="218" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.4)" text-anchor="middle">~5.4% is current variable rate</text>
  <text x="235" y="236" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.25)" text-anchor="middle">changes with borrower demand</text>
  <!-- Bottom pill -->
  <rect x="175" y="295" width="120" height="20" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="235" y="309" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="rgba(255,255,255,0.3)" text-anchor="middle">VARIABLE RATE</text>

  <!-- Card 2: Is my money locked up? (Accent) -->
  <rect x="435" y="95" width="330" height="240" rx="16" fill="rgba(0,102,255,0.07)" stroke="rgba(0,102,255,0.25)" stroke-width="1.5"/>
  <!-- Accent top bar -->
  <rect x="435" y="95" width="330" height="3" rx="2" fill="url(#vaultBar)"/>
  <text x="600" y="130" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="0.06em" fill="rgba(255,255,255,0.3)" text-anchor="middle">Is my money locked up?</text>
  <text x="600" y="190" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" fill="#0066FF" text-anchor="middle">No</text>
  <text x="600" y="218" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.7)" text-anchor="middle">Withdraw anytime</text>
  <text x="600" y="238" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.45)" text-anchor="middle">No lock-in · No fees · No notice</text>
  <!-- Green pill -->
  <rect x="550" y="295" width="100" height="20" rx="10" fill="rgba(16,185,129,0.15)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <text x="600" y="309" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#10B981" text-anchor="middle">NO LOCK-IN</text>

  <!-- Card 3: Is Vault regulated? -->
  <rect x="800" y="95" width="330" height="240" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="965" y="130" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="0.06em" fill="rgba(255,255,255,0.3)" text-anchor="middle">Is Vault regulated?</text>
  <text x="965" y="182" font-family="Inter, system-ui, sans-serif" font-size="38" font-weight="700" fill="rgba(255,255,255,0.5)" text-anchor="middle">Not yet</text>
  <text x="965" y="208" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.4)" text-anchor="middle">Pursuing ADGM authorisation</text>
  <text x="965" y="226" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.25)" text-anchor="middle">Abu Dhabi Global Market</text>
  <text x="965" y="244" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.2)" text-anchor="middle">UAE's financial free zone regulator</text>
  <!-- Bottom pill -->
  <rect x="910" y="295" width="110" height="20" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="965" y="309" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="rgba(255,255,255,0.3)" text-anchor="middle">IN PROGRESS</text>

  <!-- Footer disclaimer -->
  <text x="100" y="400" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.18)">Rates variable, not guaranteed. Vault (Prometheus Labs) pursuing ADGM authorisation, not yet licensed. vlt.money</text>
</svg>