<svg width="1200" height="420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.6" fill="rgba(255,255,255,0.04)"/>
    </pattern>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#00A3FF"/>
    </linearGradient>
    <linearGradient id="vaultArea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,102,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(0,102,255,0)"/>
    </linearGradient>
    <linearGradient id="savingsArea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="420" fill="#020810"/>
  <rect width="1200" height="420" fill="url(#dots)"/>

  <!-- Title -->
  <text x="600" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="0.12em" fill="rgba(255,255,255,0.3)">PURCHASING POWER OVER 5 YEARS — $50,000 INITIAL DEPOSIT</text>

  <!-- Chart area: x from 180 to 1020, y from 80 (top) to 320 (bottom) -->
  <!-- $50,000 base at y=320, scale: 15px per $1k ($50k=y320, $66k=y80) -->
  <!-- Year labels: 2026=180, 2027=390, 2028=600, 2029=810, 2031=1020 -->

  <!-- Grid lines -->
  <line x1="180" y1="320" x2="1020" y2="320" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="180" y1="260" x2="1020" y2="260" stroke="rgba(255,255,255,0.04)" stroke-width="1" stroke-dasharray="4 6"/>
  <line x1="180" y1="200" x2="1020" y2="200" stroke="rgba(255,255,255,0.04)" stroke-width="1" stroke-dasharray="4 6"/>
  <line x1="180" y1="140" x2="1020" y2="140" stroke="rgba(255,255,255,0.04)" stroke-width="1" stroke-dasharray="4 6"/>

  <!-- Y-axis labels ($ amounts) -->
  <text x="170" y="324" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.2)">$50k</text>
  <text x="170" y="264" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.2)">$54k</text>
  <text x="170" y="204" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.2)">$58k</text>
  <text x="170" y="144" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.2)">$62k</text>

  <!-- X-axis year labels -->
  <text x="180" y="340" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.2)">2026</text>
  <text x="390" y="340" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.2)">2027</text>
  <text x="600" y="340" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.2)">2028</text>
  <text x="810" y="340" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.2)">2029</text>
  <text x="1020" y="340" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.2)">2031</text>

  <!-- Scale: $50k = y320, $66k = y80. So 1k = 15px. -->
  <!-- Each year = 210px horizontal (180 to 1020, 4 gaps = 210px each) -->

  <!-- INFLATION LINE (~3.5%/yr) -->
  <!-- Year 0: $50k = y320 -->
  <!-- Year 1: $51,750 → y320-26=294 (15px per $1k) -->
  <!-- Year 2: $53,561 → y320-53=267 -->
  <!-- Year 3: $55,436 → y320-82=238 -->
  <!-- Year 5: $59,384 → y320-141=179 -->
  <polyline points="180,320 390,294 600,267 810,238 1020,179" fill="none" stroke="rgba(255,80,80,0.5)" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- SAVINGS LINE (0.5%/yr) -->
  <!-- Year 0: $50k = y320 -->
  <!-- Year 1: $50,250 → y320-4=316 (15px per $1k) -->
  <!-- Year 2: $50,501 → y320-8=312 -->
  <!-- Year 3: $50,754 → y320-11=309 -->
  <!-- Year 5: $51,262 → y320-19=301 -->
  <!-- SAVINGS area fill -->
  <polygon points="180,320 390,316 600,312 810,309 1020,301 1020,320" fill="rgba(255,255,255,0.03)"/>
  <polyline points="180,320 390,316 600,312 810,309 1020,301" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>

  <!-- VAULT LINE (~5.4%/yr) -->
  <!-- Year 0: $50k = y320 -->
  <!-- Year 1: $52,700 → y320-40=280 (15px per $1k) -->
  <!-- Year 2: $55,537 → y320-83=237 -->
  <!-- Year 3: $58,516 → y320-127=193 -->
  <!-- Year 5: $64,937 → y320-223=97 -->
  <!-- Vault area fill -->
  <polygon points="180,320 390,280 600,237 810,193 1020,97 1020,320" fill="url(#vaultArea)"/>
  <polyline points="180,320 390,280 600,237 810,193 1020,97" fill="none" stroke="#0066FF" stroke-width="2.5"/>

  <!-- End point dots -->
  <circle cx="1020" cy="179" r="4" fill="none" stroke="rgba(255,80,80,0.5)" stroke-width="1.5"/>
  <circle cx="1020" cy="301" r="4" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <circle cx="1020" cy="97" r="5" fill="#0066FF" stroke="rgba(0,163,255,0.4)" stroke-width="3"/>

  <!-- End point labels -->
  <text x="1030" y="184" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,100,100,0.6)">~$59k (inflation)</text>
  <text x="1030" y="305" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.35)">~$51k (savings acc.)</text>
  <text x="1030" y="101" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#0066FF">~$65k (Vault)</text>

  <!-- Gap annotation: savings vs inflation -->
  <rect x="190" y="356" width="820" height="44" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <text x="600" y="374" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.3)">Savings account loses ~$1,250/yr in purchasing power at 3.5% inflation.</text>
  <text x="600" y="390" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(0,153,255,0.6)">Vault's ~5.4% outpaces inflation — and grows your real wealth.</text>
  <text x="600" y="410" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.18)">Rates variable. Vault earns from institutional lending fees — not guaranteed. vlt.money</text>
</svg>
