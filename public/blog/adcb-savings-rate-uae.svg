<svg width="1200" height="420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="0.5" fill="rgba(255,255,255,0.04)"/>
    </pattern>
    <linearGradient id="vaultBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#00A3FF"/>
    </linearGradient>
    <linearGradient id="dimBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="420" fill="#020810"/>
  <rect width="1200" height="420" fill="url(#grid)"/>
  <ellipse cx="900" cy="200" rx="400" ry="200" fill="rgba(0,102,255,0.03)"/>

  <!-- Header label -->
  <text x="100" y="52" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" letter-spacing="0.12em" fill="rgba(255,255,255,0.25)">ADCB — SAVINGS RATES 2026</text>

  <!-- Title -->
  <text x="100" y="92" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="rgba(255,255,255,0.9)">ADCB standard savings: ~1.5%. Super Saver: 4.5%*. Vault: 5.4%, always.</text>

  <!-- Comparison rows -->
  <text x="100" y="148" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.3)">ADCB Standard Savings</text>
  <rect x="280" y="134" width="28" height="18" rx="3" fill="url(#dimBar)" opacity="0.5"/>
  <text x="316" y="148" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="rgba(239,68,68,0.7)" dx="8">0.5–1.5%</text>

  <text x="100" y="185" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.3)">ADCB Super Saver (AED 50K+, new money)*</text>
  <rect x="280" y="171" width="203" height="18" rx="3" fill="url(#dimBar)"/>
  <text x="491" y="185" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="rgba(255,255,255,0.45)" dx="8">4.5%</text>

  <text x="100" y="222" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.3)">StashAway Simple</text>
  <rect x="280" y="208" width="137" height="18" rx="3" fill="url(#dimBar)"/>
  <text x="425" y="222" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="rgba(255,255,255,0.35)" dx="8">3.6%</text>

  <text x="100" y="259" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.3)">Sarwa Save+ (net)</text>
  <rect x="280" y="245" width="113" height="18" rx="3" fill="url(#dimBar)"/>
  <text x="401" y="259" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="rgba(255,255,255,0.3)" dx="8">~3.2%</text>

  <!-- Vault — highlighted -->
  <rect x="80" y="286" width="570" height="58" rx="10" fill="rgba(0,102,255,0.07)" stroke="rgba(0,102,255,0.25)" stroke-width="1.5"/>
  <text x="100" y="322" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="rgba(255,255,255,0.9)">Vault</text>
  <text x="100" y="338" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.3)">No fee. No lock-in. No minimum.</text>
  <rect x="280" y="304" width="243" height="22" rx="4" fill="url(#vaultBar)" opacity="0.9"/>
  <text x="531" y="320" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="800" fill="#0066FF" dx="8">~5.4%</text>
  <rect x="536" y="327" width="58" height="16" rx="8" fill="rgba(16,185,129,0.15)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <text x="565" y="338" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#10B981">CURRENT</text>

  <!-- Right side callout -->
  <rect x="740" y="110" width="360" height="240" rx="16" fill="rgba(0,102,255,0.05)" stroke="rgba(0,102,255,0.12)" stroke-width="1.5"/>
  <rect x="740" y="110" width="360" height="3" rx="2" fill="url(#vaultBar)"/>

  <text x="920" y="155" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" letter-spacing="0.1em" fill="rgba(255,255,255,0.3)">ANNUAL GAP ON AED 100,000</text>

  <text x="920" y="215" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="#0066FF">AED 3,900</text>
  <text x="920" y="255" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="rgba(255,255,255,0.5)">more per year at Vault vs ADCB standard</text>
  <text x="920" y="285" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.35)">At 1.5% (ADCB) vs 5.4% (Vault)</text>
  <text x="920" y="315" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.2)">vlt.money</text>

  <!-- Footer -->
  <text x="100" y="390" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.18)">*ADCB Super Saver: AED 50K+ balance, new external funds only, existing ADCB account required. Note: AED bonus rate cuts to 2.25% (total ~4.25%) from May 1, 2026.</text>
  <text x="100" y="408" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.15)">Vault earns from institutional lending fees — not guaranteed. vlt.money</text>
</svg>
