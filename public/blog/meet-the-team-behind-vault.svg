<svg width="1200" height="420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.6" fill="rgba(255,255,255,0.04)"/>
    </pattern>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#00A3FF"/>
    </linearGradient>
    <linearGradient id="bgGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,102,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(0,102,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="420" fill="#020810"/>
  <rect width="1200" height="420" fill="url(#dots)"/>

  <!-- Center glow -->
  <ellipse cx="600" cy="180" rx="400" ry="220" fill="rgba(0,102,255,0.07)"/>

  <!-- Prometheus Labs wordmark area -->
  <rect x="340" y="80" width="520" height="180" rx="16" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Blue accent bar -->
  <rect x="340" y="80" width="520" height="3" rx="16" fill="url(#blueGrad)"/>

  <!-- V logo mark -->
  <circle cx="600" cy="124" r="28" fill="rgba(0,102,255,0.12)" stroke="rgba(0,102,255,0.35)" stroke-width="1.5"/>
  <text x="600" y="132" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#0066FF">V</text>

  <!-- Company name -->
  <text x="600" y="188" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" letter-spacing="-0.02em" fill="white">Prometheus Labs</text>

  <!-- Tagline -->
  <text x="600" y="218" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="rgba(255,255,255,0.4)">Building Vault · Democratizing institutional yields</text>

  <!-- Location badge -->
  <rect x="530" y="236" width="140" height="28" rx="14" fill="rgba(0,102,255,0.08)" stroke="rgba(0,102,255,0.2)" stroke-width="1"/>
  <text x="600" y="255" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="rgba(0,153,255,0.8)">Abu Dhabi · ADGM</text>

  <!-- Three pillars -->
  <rect x="160" y="316" width="260" height="72" rx="10" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="290" y="348" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.7)">Banking &amp; Finance</text>
  <text x="290" y="370" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.3)">Institutional experience</text>

  <rect x="470" y="316" width="260" height="72" rx="10" fill="rgba(0,102,255,0.05)" stroke="rgba(0,102,255,0.15)" stroke-width="1"/>
  <text x="600" y="348" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.7)">Financial Infrastructure</text>
  <text x="600" y="370" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.3)">How yields actually work</text>

  <rect x="780" y="316" width="260" height="72" rx="10" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="910" y="348" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.7)">Consumer Technology</text>
  <text x="910" y="370" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.3)">Simple for everyone</text>
  <text x="600" y="408" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.18)">vlt.money</text>
</svg>
