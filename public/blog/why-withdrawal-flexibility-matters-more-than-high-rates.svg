<svg width="1200" height="420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.6" fill="rgba(255,255,255,0.04)"/>
    </pattern>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#00A3FF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="420" fill="#020810"/>
  <rect width="1200" height="420" fill="url(#dots)"/>
  <ellipse cx="600" cy="210" rx="520" ry="170" fill="rgba(0,102,255,0.03)"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="0.12em" fill="rgba(255,255,255,0.3)">FLEXIBILITY VS LOCK-IN</text>

  <!-- Left: Locked (high rate but trapped) -->
  <rect x="100" y="90" width="420" height="240" rx="14" fill="rgba(255,255,255,0.02)" stroke="rgba(239,68,68,0.2)" stroke-width="1.5"/>

  <!-- Lock icon -->
  <rect x="272" y="120" width="56" height="44" rx="6" fill="rgba(239,68,68,0.1)" stroke="rgba(239,68,68,0.3)" stroke-width="1.5"/>
  <path d="M284,120 Q300,100 316,120" fill="none" stroke="rgba(239,68,68,0.4)" stroke-width="2.5"/>
  <circle cx="300" cy="140" r="4" fill="rgba(239,68,68,0.6)"/>

  <text x="310" y="190" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="rgba(255,255,255,0.4)">5.5%</text>
  <text x="310" y="214" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.25)">12-month term deposit</text>

  <rect x="160" y="236" width="300" height="1" fill="rgba(255,255,255,0.05)"/>
  <text x="310" y="264" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(239,68,68,0.5)">✗  Can't access for 12 months</text>
  <text x="310" y="286" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(239,68,68,0.4)">✗  Early exit fee if emergency</text>
  <text x="310" y="308" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(239,68,68,0.4)">✗  Rate locked in before cuts</text>

  <!-- Right: Flexible Vault -->
  <rect x="680" y="90" width="420" height="240" rx="14" fill="rgba(0,102,255,0.07)" stroke="#0066FF" stroke-width="1.5"/>
  <rect x="680" y="90" width="420" height="3" rx="14" fill="url(#blueGrad)"/>

  <!-- Unlock icon -->
  <rect x="952" y="120" width="56" height="44" rx="6" fill="rgba(0,102,255,0.12)" stroke="rgba(0,102,255,0.3)" stroke-width="1.5"/>
  <path d="M964,108 Q980,88 996,108" fill="none" stroke="rgba(0,102,255,0)" stroke-width="0"/>
  <circle cx="980" cy="140" r="4" fill="#0066FF"/>

  <text x="890" y="190" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#0066FF">~5.4%</text>
  <text x="890" y="214" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.35)">Vault — no lock-in</text>

  <rect x="740" y="236" width="300" height="1" fill="rgba(0,102,255,0.1)"/>
  <text x="890" y="264" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(16,185,129,0.7)">✓  Withdraw anytime</text>
  <text x="890" y="286" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(16,185,129,0.6)">✓  No early exit penalties</text>
  <text x="890" y="308" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(16,185,129,0.6)">✓  Rate reflects current markets</text>

  <!-- VS divider -->
  <text x="600" y="218" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.12)">vs</text>

  <!-- Footer -->
  <text x="600" y="388" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.2)">A 0.1% rate difference is worth nothing if you can't access your money when you need it.</text>
  <text x="600" y="408" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.18)">Rate variable, not guaranteed · vlt.money</text>
</svg>
