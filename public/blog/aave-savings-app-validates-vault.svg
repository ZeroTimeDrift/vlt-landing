<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420">
  <rect width="1200" height="420" fill="#020810"/>

  <defs>
    <radialGradient id="glow1" cx="30%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#020810" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="75%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#0066FF" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#020810" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#10b981" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0066FF" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="fillGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background glows -->
  <ellipse cx="360" cy="210" rx="340" ry="240" fill="url(#glow1)"/>
  <ellipse cx="900" cy="190" rx="300" ry="220" fill="url(#glow2)"/>

  <!-- Subtle grid -->
  <line x1="0" y1="100" x2="1200" y2="100" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="200" x2="1200" y2="200" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="300" x2="1200" y2="300" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="420" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="420" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="900" y1="0" x2="900" y2="420" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Chart fill area -->
  <polygon points="120,310 240,285 380,265 520,240 660,210 790,182 930,155 1080,125 1080,390 120,390"
           fill="url(#fillGrad)"/>

  <!-- Chart line -->
  <polyline points="120,310 240,285 380,265 520,240 660,210 790,182 930,155 1080,125"
            stroke="url(#lineGrad)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Dot on chart line at UAE node -->
  <circle cx="790" cy="182" r="5" fill="#0066FF" opacity="0.9"/>
  <circle cx="790" cy="182" r="12" fill="#0066FF" opacity="0.2"/>

  <!-- US node -->
  <circle cx="340" cy="255" r="7" fill="#10b981" opacity="0.95"/>
  <circle cx="340" cy="255" r="18" fill="#10b981" opacity="0.12"/>
  <text x="340" y="286" fill="#10B981" font-size="13" font-family="Inter, system-ui, sans-serif" text-anchor="middle" opacity="0.7">US</text>
  <text x="340" y="300" fill="#10B981" font-size="11" font-family="Inter, system-ui, sans-serif" text-anchor="middle" opacity="0.45">Aave App</text>

  <!-- UAE node -->
  <circle cx="790" cy="182" r="7" fill="#0066FF" opacity="0.95"/>
  <circle cx="790" cy="182" r="18" fill="#0066FF" opacity="0.12"/>
  <text x="790" y="213" fill="#ffffff" font-size="13" font-family="Inter, system-ui, sans-serif" text-anchor="middle" opacity="0.7">UAE</text>
  <text x="790" y="227" fill="#ffffff" font-size="11" font-family="Inter, system-ui, sans-serif" text-anchor="middle" opacity="0.45">Vault</text>

  <!-- Dashed connection between US and UAE nodes -->
  <line x1="353" y1="250" x2="777" y2="187" stroke="#ffffff" stroke-width="1" stroke-opacity="0.1" stroke-dasharray="6,4"/>

  <!-- Rate card -->
  <rect x="900" y="60" width="200" height="82" rx="10" fill="#0a1628" stroke="#10b981" stroke-width="1" stroke-opacity="0.4"/>
  <text x="1000" y="90" fill="#10B981" font-size="12" font-family="Inter, system-ui, sans-serif" text-anchor="middle" opacity="0.7" letter-spacing="1">CURRENT RATE</text>
  <text x="1000" y="124" fill="#10b981" font-size="32" font-family="Inter, system-ui, sans-serif" text-anchor="middle" font-weight="700">~5.4%</text>

  <!-- Category label -->
  <rect x="120" y="56" width="240" height="34" rx="6" fill="#0a1628" stroke="#0066FF" stroke-width="1" stroke-opacity="0.35"/>
  <text x="240" y="78" fill="#ffffff" font-size="12" font-family="Inter, system-ui, sans-serif" text-anchor="middle" opacity="0.8" letter-spacing="1">CATEGORY VALIDATED</text>

  <!-- Bottom headline -->
  <line x1="120" y1="350" x2="1080" y2="350" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <text x="120" y="378" fill="#ffffff" font-size="18" font-family="Inter, system-ui, sans-serif" font-weight="500" opacity="0.75">The model is proven. Vault brings it to the UAE.</text>

  <!-- Scatter dots -->
  <circle cx="160" cy="140" r="2" fill="#10b981" opacity="0.35"/>
  <circle cx="195" cy="120" r="1.5" fill="#10b981" opacity="0.25"/>
  <circle cx="480" cy="330" r="2" fill="#0066FF" opacity="0.25"/>
  <circle cx="630" cy="355" r="1.5" fill="#10b981" opacity="0.2"/>
  <circle cx="860" cy="330" r="2" fill="#0066FF" opacity="0.2"/>
  <circle cx="1020" cy="290" r="1.5" fill="#10b981" opacity="0.28"/>
  <circle cx="1120" cy="220" r="2" fill="#10b981" opacity="0.3"/>
  <circle cx="550" cy="90" r="1.5" fill="#0066FF" opacity="0.2"/>
  <circle cx="700" cy="75" r="2" fill="#10b981" opacity="0.18"/>
</svg>
