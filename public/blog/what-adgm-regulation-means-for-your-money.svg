<svg width="1200" height="420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.6" fill="rgba(255,255,255,0.04)"/>
    </pattern>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#00A3FF"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,102,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(0,102,255,0.05)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="420" fill="#020810"/>
  <rect width="1200" height="420" fill="url(#dots)"/>
  <ellipse cx="600" cy="200" rx="420" ry="180" fill="rgba(0,102,255,0.04)"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="0.12em" fill="rgba(255,255,255,0.3)">ADGM REGULATION</text>

  <!-- Shield shape (simplified as path) -->
  <path d="M600,85 L680,115 L680,195 Q680,240 600,265 Q520,240 520,195 L520,115 Z" fill="url(#shieldGrad)" stroke="#0066FF" stroke-width="1.5"/>

  <!-- Shield inner glow -->
  <path d="M600,100 L665,126 L665,192 Q665,230 600,252 Q535,230 535,192 L535,126 Z" fill="rgba(0,102,255,0.08)"/>

  <!-- ADGM text in shield -->
  <text x="600" y="168" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#0066FF">ADGM</text>
  <text x="600" y="188" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">Abu Dhabi Global</text>
  <text x="600" y="204" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">Market</text>

  <!-- Left pillars -->
  <rect x="100" y="130" width="320" height="210" rx="12" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="260" y="165" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.6)">What ADGM means</text>

  <text x="120" y="200" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">✓  Licensed oversight</text>
  <text x="120" y="225" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">✓  Consumer protection rules</text>
  <text x="120" y="250" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">✓  Financial crime controls</text>
  <text x="120" y="275" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">✓  Transparent fee structure</text>
  <text x="120" y="300" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">✓  Dispute resolution</text>

  <!-- Right: status -->
  <rect x="780" y="130" width="320" height="210" rx="12" fill="rgba(0,102,255,0.06)" stroke="rgba(0,102,255,0.2)" stroke-width="1"/>
  <rect x="780" y="130" width="320" height="3" rx="12" fill="url(#blueGrad)"/>
  <text x="940" y="165" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.6)">Vault's status</text>

  <rect x="835" y="182" width="210" height="26" rx="13" fill="rgba(0,102,255,0.12)" stroke="rgba(0,102,255,0.3)" stroke-width="1"/>
  <text x="940" y="199" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#0066FF">Pursuing ADGM authorisation</text>

  <text x="940" y="234" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.35)">Prometheus Labs is registered</text>
  <text x="940" y="254" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.35)">in ADGM, Abu Dhabi</text>
  <text x="940" y="294" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.2)">Regulation = trust, not just compliance.</text>

  <!-- Footer -->
  <text x="600" y="388" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.2)">We believe regulated products are better products.</text>
  <text x="600" y="408" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.18)">vlt.money</text>
</svg>
